qdrant:
  # For local Docker: set url to null and provide host/port
  # For Qdrant Cloud: set QDRANT_URL env var (or Streamlit secret) — never hardcode here
  url: null
  host: null
  port: null
  collection_name: "financial_docs"
  # api_key read from QDRANT_API_KEY env var — never hardcode here

embedding:
  model: "all-MiniLM-L6-v2"
  batch_size: 32

chunking:
  chunk_size: 800
  chunk_overlap: 150

retrieval:
  top_k: 10

reranking:
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k_after_rerank: 4

generation:
  model: "llama-3.3-70b-versatile"
  max_tokens: 1024
  temperature: 0.0

paths:
  raw_data: "data/raw"
  eval_data: "data/eval/qa_pairs.json"
  eval_output: "eval_results.json"
